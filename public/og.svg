<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0518"/>
      <stop offset="100%" stop-color="#130d2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="herotext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
    <clipPath id="clip"><rect width="1200" height="630"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs matching site -->
  <ellipse cx="150" cy="300" rx="400" ry="350" fill="url(#orb1)" filter="url(#blur1)" clip-path="url(#clip)"/>
  <ellipse cx="900" cy="200" rx="350" ry="300" fill="url(#orb2)" filter="url(#blur2)" clip-path="url(#clip)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#brand)"/>

  <!-- Nav bar simulation -->
  <text x="80" y="48" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-0.5">Speak<tspan fill="url(#brand)">IQ</tspan></text>

  <!-- LEFT SIDE: hero copy -->

  <!-- Tag pill -->
  <rect x="80" y="90" width="300" height="30" rx="15" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="230" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">🌍 50+ Languages · AI Native Speaker Tutor</text>

  <!-- Hero heading -->
  <text x="80" y="175" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">Your AI</text>
  <text x="80" y="255" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="url(#herotext)" letter-spacing="-2">language tutor</text>
  <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="rgba(255,255,255,0.45)" letter-spacing="-1">available 24/7</text>

  <!-- Subtext -->
  <text x="80" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">Real conversations · instant corrections · automatic flashcards</text>

  <!-- Stats row -->
  <g transform="translate(80, 410)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="100" height="62" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">50+</text>
    <text x="50" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Languages</text>

    <!-- Stat 2 -->
    <rect x="116" y="0" width="80" height="62" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="156" y="28" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">7</text>
    <text x="156" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Modes</text>

    <!-- Stat 3 -->
    <rect x="212" y="0" width="80" height="62" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="252" y="28" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">$7</text>
    <text x="252" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Pro/mo</text>

    <!-- Stat 4 -->
    <rect x="308" y="0" width="90" height="62" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="353" y="28" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">$0</text>
    <text x="353" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Free plan</text>
  </g>

  <!-- RIGHT SIDE: Configure your session panel -->
  <g transform="translate(660, 60)">
    <!-- Card -->
    <rect x="0" y="0" width="460" height="510" rx="16" fill="rgba(18,10,40,0.95)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>

    <!-- Card header -->
    <text x="24" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="17" fill="white">Configure your session</text>
    <text x="24" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">What do you want to learn? · 50+ languages · 6 levels</text>

    <!-- Divider -->
    <rect x="0" y="70" width="460" height="1" fill="rgba(255,255,255,0.06)"/>

    <!-- Language selector -->
    <text x="24" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.5">MY LANGUAGE</text>
    <rect x="24" y="108" width="412" height="44" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="56" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white">🇪🇸  Spanish</text>
    <text x="416" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">▾</text>

    <!-- Level -->
    <text x="24" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.5">MY LEVEL</text>
    <rect x="24" y="188" width="130" height="36" rx="8" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.6)" stroke-width="1"/>
    <text x="89" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Beginner</text>
    <rect x="162" y="188" width="130" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="227" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Intermediate</text>
    <rect x="300" y="188" width="130" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="365" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Advanced</text>

    <!-- Session type label -->
    <text x="24" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.5">SESSION TYPE</text>

    <!-- Mode grid 2x3 -->
    <!-- Row 1 -->
    <rect x="24" y="262" width="196" height="52" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
    <text x="36" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600">💬 Conversation</text>
    <text x="36" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Free-flowing dialogue</text>

    <rect x="236" y="262" width="196" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="248" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">📚 Vocabulary</text>
    <text x="248" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Build word bank</text>

    <!-- Row 2 -->
    <rect x="24" y="322" width="196" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="36" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">✏️ Grammar</text>
    <text x="36" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Rules + corrections</text>

    <rect x="236" y="322" width="196" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="248" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">🎯 Quiz me</text>
    <text x="248" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Test your knowledge</text>

    <!-- Row 3 -->
    <rect x="24" y="382" width="196" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="36" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">🔄 Translate</text>
    <text x="36" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Phrase practice</text>

    <rect x="236" y="382" width="196" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="248" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">📖 Story</text>
    <text x="248" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Narrative immersion</text>

    <!-- CTA button -->
    <rect x="24" y="452" width="412" height="46" rx="12" fill="url(#cta)"/>
    <text x="230" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="700">Start 🎙 Conversation in Spanish →</text>
  </g>
</svg>
